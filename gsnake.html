<div class="flex items-center justify-center md:p-8 md:justify-between">
    <div class="bg-slate-900 flex justify-center items-center p-4">
        <div class="text-center">
        
            <h1 class="text-4xl font-bold text-green-400 mb-4">
                🐍 Snake Game
            </h1>
        
            <div class="flex justify-between text-white mb-3">
        
                <p>
                    Score :
                    <span id="score">0</span>
                </p>
        
                <button id="restart"
                    class="bg-green-500 hover:bg-green-600 px-4 py-1 rounded">
                    Restart
                </button>
        
            </div>
        
            <canvas
                id="snake"
                width="300"
                height="300"
                class="bg-gray-800 border-4 border-green-500 rounded-xl md:w-[400px] md:h-[400px]">
            </canvas>
        
            <p id="gameOver"
                class="hidden text-red-400 text-3xl mt-5 font-bold">
                GAME OVER
            </p>
        
        </div>
    </div>
</div>
