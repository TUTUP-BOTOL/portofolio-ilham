<div class="flex justify-center items-center lg:p-8">
    <div class="bg-slate-800 p-4 rounded-3xl shadow-2xl">
    
        <!-- Judul -->
        <h1 class="text-4xl font-bold text-center text-white mb-8">
            Random Puzzle
        </h1>
    
        <!-- Board Puzzle -->
        <div id="boardPuzzle" class="grid grid-cols-4 gap-1 w-[300px] h-[300px] md:w-[500px] md:h-[500px] bg-slate-900 p-2 rounded-xl">
        </div>
    
        <!-- Tombol -->
        <div class="flex justify-center gap-4 mt-5 ">
    
            <button id="shuffleBtn" 
                    class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-[14px]
                        md:font-semibold md:px-6 md:py-3">
                🔀 <br> Shuffle
            </button>
    
            <button id="resetBtn" 
                    class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded-xl text-[14px]
                        md:font-semibold md:px-6 md:py-3">
                🔄 <br> Reset
            </button>
    
            <button id="randomImage" 
                    class="px-3 py-1 bg-purple-600 hover:bg-purple-700 text-white rounded-xl text-[14px]
                        md:font-semibold md:px-6 md:py-3">
                🎲 <br> Acak
            </button>
    
        </div>
    
        
        
    </div>
    <!-- Popup Menang -->
    <div id="winPopup" class="fixed inset-0 hidden bg-black/70 flex justify-center items-center">
    
        <div class="bg-white rounded-2xl p-8 text-center w-80">
    
            <h2 class="text-3xl font-bold text-green-600">
                🎉 Selamat!
            </h2>
    
            <p class="mt-4 text-gray-600">
                Puzzle berhasil disusun.
            </p>
    
            <button id="playAgain" class="mt-6 bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl">
                Main Lagi
            </button>
    
        </div>
    
    </div>
</div>
